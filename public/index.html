<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lzhenweiDev - Roblox Lua Scripts</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #00ff88;
            --accent-hover: #00cc6a;
            --border: #333333;
            --danger: #ff4444;
            --danger-hover: #cc0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--accent), #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: block;
        }

        .upload-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .upload-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.2rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            flex: 1;
            min-width: 200px;
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent);
        }

        .search-bar {
            margin-bottom: 2rem;
        }

        .search-bar input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .scripts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .script-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .script-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.1);
        }

        .script-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .script-description {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .script-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .tag {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.7rem;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .script-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-copy {
            background: var(--accent);
            color: var(--bg-primary);
            flex: 1;
        }

        .btn-copy:hover {
            background: var(--accent-hover);
        }

        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .loading, .error, .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .error {
            color: var(--danger);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Courier New', monospace;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-submit {
            background: var(--accent);
            color: var(--bg-primary);
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            flex: 1;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
        }

        .btn-cancel:hover {
            background: var(--bg-card);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .scripts-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <h1>lzhenweiDev</h1>
                <span>Roblox Lua Scripts • Executor Ready</span>
            </div>
            <button class="upload-btn" onclick="openUploadModal()">
                📤 Script hochladen
            </button>
        </div>
    </header>

    <main>
        <div class="stats">
            <div class="stat-card">
                <h3>📜 Scripts insgesamt</h3>
                <p id="totalScripts">0</p>
            </div>
            <div class="stat-card">
                <h3>👤 Entwickler</h3>
                <p>lzhenweiDev</p>
            </div>
            <div class="stat-card">
                <h3>🛡️ Executor</h3>
                <p>Universal</p>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Scripts durchsuchen..." onkeyup="filterScripts()">
        </div>

        <div class="scripts-grid" id="scriptsContainer">
            <div class="loading">📡 Scripts werden geladen...</div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <h2>📤 Neues Script hochladen</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="scriptName">Script Name *</label>
                    <input type="text" id="scriptName" required placeholder="z.B. AutoFarm GUI">
                </div>
                <div class="form-group">
                    <label for="scriptDescription">Beschreibung</label>
                    <textarea id="scriptDescription" rows="3" placeholder="Beschreibe dein Script..."></textarea>
                </div>
                <div class="form-group">
                    <label for="scriptGame">Spiel</label>
                    <input type="text" id="scriptGame" placeholder="z.B. Blox Fruits, Brookhaven...">
                </div>
                <div class="form-group">
                    <label for="scriptTags">Tags (durch Komma getrennt)</label>
                    <input type="text" id="scriptTags" placeholder="z.B. AutoFarm, ESP, Teleport">
                </div>
                <div class="form-group">
                    <label for="scriptCode">Lua Code *</label>
                    <textarea id="scriptCode" required placeholder="Füge hier deinen Lua Code ein..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeUploadModal()">Abbrechen</button>
                    <button type="submit" class="btn-submit">🚀 Hochladen</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2024 lzhenweiDev • Alle Scripts sind für Bildungszwecke</p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem;">Nutzung auf eigene Verantwortung</p>
    </footer>

    <script>
        // Firebase Initialisierung
        const firebaseConfig = {
            apiKey: "AIzaSyDbUDfq_HtPkYS6ec0rKIA8wSOT2T2d51Q",
            authDomain: "rblx-scripts.firebaseapp.com",
            projectId: "rblx-scripts",
            storageBucket: "rblx-scripts.firebasestorage.app",
            messagingSenderId: "616479219135",
            appId: "1:616479219135:web:c7682d59af893d901ad50a",
            measurementId: "G-4DMEM8F743"
        };

        // Firebase initialisieren
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let allScripts = [];

        // Scripts laden
        async function loadScripts() {
            const container = document.getElementById('scriptsContainer');
            container.innerHTML = '<div class="loading">📡 Scripts werden geladen...</div>';

            try {
                const snapshot = await db.collection('scripts').orderBy('timestamp', 'desc').get();
                allScripts = [];
                
                snapshot.forEach((doc) => {
                    allScripts.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                displayScripts(allScripts);
                updateStats();
            } catch (error) {
                console.error('Fehler beim Laden:', error);
                container.innerHTML = `
                    <div class="error">
                        ❌ Fehler beim Laden der Scripts<br>
                        <small>${error.message}</small>
                    </div>`;
            }
        }

        // Scripts anzeigen
        function displayScripts(scripts) {
            const container = document.getElementById('scriptsContainer');

            if (scripts.length === 0) {
                container.innerHTML = '<div class="empty">📭 Keine Scripts gefunden</div>';
                return;
            }

            container.innerHTML = scripts.map(script => `
                <div class="script-card">
                    <h3 class="script-title">${escapeHtml(script.name)}</h3>
                    ${script.description ? `<p class="script-description">${escapeHtml(script.description)}</p>` : ''}
                    ${script.game ? `<p style="color: var(--text-secondary); margin-bottom: 0.5rem;">🎮 ${escapeHtml(script.game)}</p>` : ''}
                    
                    ${script.tags && script.tags.length > 0 ? `
                        <div class="script-tags">
                            ${script.tags.map(tag => `<span class="tag">#${escapeHtml(tag.trim())}</span>`).join('')}
                        </div>
                    ` : ''}
                    
                    <div class="script-meta">
                        <span>📅 ${new Date(script.timestamp?.toDate?.() || script.timestamp).toLocaleDateString('de-DE')}</span>
                        <span>👁️ ${script.views || 0} Aufrufe</span>
                    </div>
                    
                    <div class="script-actions">
                        <button class="btn btn-copy" onclick="copyScript('${script.id}')">📋 Code kopieren</button>
                        <button class="btn btn-delete" onclick="deleteScript('${script.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Script kopieren
        async function copyScript(scriptId) {
            const script = allScripts.find(s => s.id === scriptId);
            if (!script) return;

            try {
                await navigator.clipboard.writeText(script.code);
                
                // Toast-ähnliche Benachrichtigung
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ Kopiert!';
                btn.style.background = '#00cc6a';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);

                // Views erhöhen
                db.collection('scripts').doc(scriptId).update({
                    views: firebase.firestore.FieldValue.increment(1)
                });
            } catch (error) {
                alert('Fehler beim Kopieren: ' + error.message);
            }
        }

        // Script löschen
        async function deleteScript(scriptId) {
            if (!confirm('Bist du sicher, dass du dieses Script löschen möchtest?')) return;

            try {
                await db.collection('scripts').doc(scriptId).delete();
                await loadScripts();
            } catch (error) {
                alert('Fehler beim Löschen: ' + error.message);
            }
        }

        // Upload Modal
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
            document.getElementById('uploadForm').reset();
        }

        // Formular Submit
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Wird hochgeladen...';

            const scriptData = {
                name: document.getElementById('scriptName').value,
                description: document.getElementById('scriptDescription').value,
                game: document.getElementById('scriptGame').value,
                tags: document.getElementById('scriptTags').value
                    .split(',')
                    .map(tag => tag.trim())
                    .filter(tag => tag.length > 0),
                code: document.getElementById('scriptCode').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                views: 0
            };

            try {
                await db.collection('scripts').add(scriptData);
                closeUploadModal();
                await loadScripts();
            } catch (error) {
                alert('Fehler beim Hochladen: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Hochladen';
            }
        });

        // Suchfunktion
        function filterScripts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allScripts.filter(script => 
                script.name.toLowerCase().includes(searchTerm) ||
                (script.description && script.description.toLowerCase().includes(searchTerm)) ||
                (script.game && script.game.toLowerCase().includes(searchTerm)) ||
                (script.tags && script.tags.some(tag => tag.toLowerCase().includes(searchTerm)))
            );
            
            displayScripts(filtered);
        }

        // Statistiken aktualisieren
        function updateStats() {
            document.getElementById('totalScripts').textContent = allScripts.length;
        }

        // Hilfsfunktion
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal schließen bei Klick außerhalb
        document.getElementById('uploadModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeUploadModal();
            }
        });

        // ESC-Taste zum Schließen
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeUploadModal();
            }
        });

        // Initial laden
        loadScripts();
    </script>
</body>
</html>
